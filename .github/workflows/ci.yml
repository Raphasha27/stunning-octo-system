name: Continuous Integration

on:
  workflow_dispatch:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  mobile:
    name: Mobile (Expo)
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch:
 '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Type Check
        run: npx tsc --noEmit || true

  security_scan:
    name: Security Scan (Trivy)
    needs: mobile
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'


